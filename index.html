<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; }
        .movie-card { background: #1a1a1a; padding: 10px; margin: 10px; border-radius: 8px; border: 1px solid #e50914; }
        input { padding: 8px; width: 70%; border-radius: 5px; }
        button { background: #e50914; color: #fff; padding: 8px 15px; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎬 سينما الزعيم العالمية</h1>
    <div id="movies">جاري جلب الأفلام...</div>
    
    <div style="margin-top:20px; border-top: 1px solid #333; padding-top:10px;">
        <input type="password" id="pass" placeholder="باسورد الأدمين...">
        <button onclick="checkAdmin()">دخول الأدمين</button>
        <div id="admin-panel" style="display:none; margin-top:10px;">🛠️ لوحة الأدمين: أضف روابط دفع يدوية هنا</div>
    </div>

    <script>
        // ربط API الأفلام (TMDB)
        fetch('https://api.themoviedb.org/3/movie/popular?api_key=545c45388c644d5c093a02a4d3390f7d&language=ar-AR')
        .then(res => res.json()).then(data => {
            const container = document.getElementById('movies');
            data.results.forEach(m => {
                container.innerHTML += `<div class="movie-card"><h3>${m.title}</h3><p>${m.overview.substring(0,50)}...</p></div>`;
            });
        });

        function checkAdmin() {
            if(document.getElementById('pass').value === "Zza3iim2137321701") {
                document.getElementById('admin-panel').style.display = "block";
                alert("تم الدخول للوحة التحكم!");
            } else { alert("باسورد غلط يا زعيم!"); }
        }
    </script>
</body>
</html>
