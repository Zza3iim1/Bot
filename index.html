<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .tab { display: none; }
        .active { display: block; }
        .btn { background: #e50914; color: #fff; padding: 10px; border-radius: 5px; border: none; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="view" class="tab active">
        <h2>🎬 سينما الزعيم</h2>
        <div id="video-player" style="background: #222; height: 200px; display: flex; align-items: center; justify-content: center;">مشغل الفيديو</div>
    </div>
    
    <div id="shop" class="tab">
        <h2>🛒 متجر الزعيم</h2>
        <div id="products">جاري تحميل المنتجات...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
        }
    </script>
</body>
</html>
